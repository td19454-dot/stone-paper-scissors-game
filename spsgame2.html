<!DOCTYPE html>
<html lang="en">
<head>
    <title>game</title>
    <style>
        body {
            text-align: center;
        }
        .click{
         text-align: center;
         font-size: xx-large;
         height : 100px;
         width : 300px;
         margin : 50px;
         border-radius: 80px;
         background-color: antiquewhite;

}
    </style>
</head>
<body>
    <h1>Stone  Paper Scissors Game</h1>

    <button class="click" onclick="
    generateComputerChoice();
    let result;
    if (computerChoice === 'stone'){
        result = 'it is a tie'
    }
    else if (computerChoice === 'paper'){
        result = 'you lose'
    }
    else{
        result = 'you win'
    }
    alert('You chose stone. ' + result + ' and the computer choice is ' + computerChoice)
    "
> 🪨 stone</button>

<button class="click" onclick="
    generateComputerChoice();
    let result1;
    if (computerChoice === 'stone'){
        result1 = 'you win'
    }
    else if (computerChoice === 'paper'){
        result1 = 'it is a tie'
    }
    else{
        result1 = 'you lose'
    }
    alert('You chose paper. ' + result1 + ' and the computer choice is ' + computerChoice)
    "
> 📄 paper</button>
 
<button class="click" onclick="
    generateComputerChoice();
    let result2;
    if (computerChoice === 'stone'){
        result2 = 'you lose'
    }
    else if (computerChoice === 'paper'){
        result2 = 'you win'
    }
    else{
        result2 = 'it is a tie'
    }
    alert('You chose scissors. ' + result2 + ' and the computer choice is ' + computerChoice)
    "
> ✂ scissors</button><hr>


<footer>
    <h3>
        THE RULE OF THE GAME : <br>
                  1. STONE    DEFEAT  SCISSORS<br>
                  2. SCISSORS  DEFEAT   PAPER<br>
                  3.PAPER     DEFEAT    STONE<hr>
    </h3>
    <p>
        here u will choose stone,paper or scissors and the computer also choose one of the thing among the three option and basis on the rule mentioned above we will givve u the result
    </p>
</footer>
    <script>
        let computerChoice;
        function generateComputerChoice(){
            let randomNumber = Math.floor(Math.random() * 3);
            if (randomNumber === 0){
                computerChoice = 'stone'
            }
            else if (randomNumber === 1){
                computerChoice = 'paper'
            }
            else {
                computerChoice = 'scissors'
            }
        }
    </script>


</body>
</html>
